<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fluentify</title>
    <link rel="stylesheet" href="popup.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <!-- the main container with that cool glass look -->
    <div class="glass-container">
        <header>
            <h1 id="app-title">fluentify</h1>
            <!-- gear icon to open the settings panel -->
            <button id="settings-toggle" class="icon-btn" title="Settings">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path
                        d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                    </path>
                </svg>
            </button>
        </header>

        <main>
            <!-- switch between home and the coach/vocab views -->
            <div class="tab-bar">
                <button id="tab-home" class="tab-btn active">Home</button>
                <button id="tab-lessons" class="tab-btn">Lessons Learned</button>
            </div>

            <!-- home view has the big simplify button and some toggles -->
            <div id="home-view" class="tab-content">
                <div id="simplify-action-container" style="margin-bottom: 20px;">
                    <button id="simplify-page-btn" class="primary-btn">Simplify current page</button>
                </div>

                <div class="status-card">
                    <label class="switch-container">
                        <span class="label-text">Enable highlights</span>
                        <input type="checkbox" id="master-toggle" checked>
                        <span class="slider"></span>
                    </label>
                </div>

                <div class="status-card">
                    <label class="switch-container">
                        <span class="label-text">Auto-simplify on load</span>
                        <input type="checkbox" id="auto-simplify-toggle" checked>
                        <span class="slider"></span>
                    </label>
                </div>

                <!-- shows how many words you've encountered and mastered -->
                <div class="stats-grid">
                    <div class="stat-item">
                        <span class="stat-value" id="stats-seen">0</span>
                        <span class="stat-label">Words</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="stats-mastered">0</span>
                        <span class="stat-label">Mastered</span>
                    </div>
                </div>
            </div>

            <!-- lessons learned view has the ai coach and your personal vocab list -->
            <div id="lessons-view" class="tab-content hidden">
                <!-- sub-tab bar inside lessons learned -->
                <div class="sub-tab-bar">
                    <button id="sub-tab-coach" class="sub-tab-btn active">AI Coach</button>
                    <button id="sub-tab-vocab" class="sub-tab-btn">My Vocabulary</button>
                </div>

                <!-- loading state when the ai is thinkin' -->
                <div id="insights-loading" class="hidden" style="text-align: center; padding: 20px;">
                    <div class="spinner" style="margin: 0 auto 12px;"></div>
                    <p class="stat-label">Analyzing...</p>
                </div>

                <div id="insights-display">
                    <!-- sub-view: ai coach advice and language picker -->
                    <div id="coach-sub-view">
                        <div class="coach-container" style="margin-bottom: 24px;">
                            <div
                                style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                                <h4 class="label-text" style="margin: 0; font-size: 0.7rem; text-transform: uppercase;">
                                    AI COACH</h4>
                                <div style="display: flex; align-items: center; gap: 8px;">
                                    <select id="coach-language-select" class="glass-select"
                                        title="Select Coaching Language">
                                        <option value="English">English</option>
                                        <option value="Chinese">Chinese</option>
                                        <option value="French">French</option>
                                        <option value="Spanish">Spanish</option>
                                        <option value="Japanese">Japanese</option>
                                        <option value="Korean">Korean</option>
                                        <option value="German">German</option>
                                    </select>
                                    <button id="refresh-coach-btn" class="icon-btn" title="Refresh Analysis">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                            stroke-linecap="round" stroke-linejoin="round"
                                            style="width: 14px; height: 14px;">
                                            <path d="M23 4v6h-6"></path>
                                            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                            <div id="ai-insight-card">
                                <p id="ai-insight-text" class="insight-text"></p>
                            </div>
                        </div>
                    </div>

                    <!-- sub-view: the actual list of words you're learning -->
                    <div id="vocab-sub-view" class="hidden">
                        <div id="lessons-learned-container">
                            <h4 class="label-text"
                                style="margin-bottom: 12px; font-size: 0.7rem; text-transform: uppercase;">
                                MY VOCABULARY</h4>
                            <div id="lessons-empty-msg" class="insight-text hidden"
                                style="text-align: center; color: var(--text-dim); padding: 20px;">
                                No focal words yet. Keep reading!
                            </div>
                            <div id="word-list" class="word-list"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- hidden panel for settings like the api key and debug tools -->
            <div id="settings-panel" class="hidden-panel">
                <div class="level-section">
                    <label class="label-text" style="display: block; margin-bottom: 8px;">OpenAI API Key</label>
                    <div class="input-group" style="display: flex; gap: 8px;">
                        <input type="password" id="openai-key" placeholder="sk-...">
                        <button id="save-key" class="primary-btn">Save</button>
                    </div>
                </div>
                <div class="level-section">
                    <label class="label-text" style="display: block; margin-bottom: 8px;">Maintenance</label>
                    <div style="display: flex; gap: 8px;">
                        <button id="open-debug" class="primary-btn glass-btn">Debug tools</button>
                        <button id="reset-db" class="primary-btn" style="background: #ef4444;">Reset data</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    </div>

    <!-- vault detail panel: shows specific hard sentences for a word -->
    <div id="vault-detail-panel" class="hidden">
        <div class="panel-header">
            <button id="close-vault-detail" class="icon-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </button>
            <h2 id="vault-word-title">Vault</h2>
        </div>
        <div class="insights-content">
            <ul id="vault-sentence-list" class="mini-list"></ul>
        </div>
    </div>

    <!-- debug panel: where developers can play with the database -->
    <div id="debug-panel" class="hidden">
        <div class="panel-header">
            <button id="close-debug" class="icon-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </button>
            <h2>Memory</h2>
        </div>
        <div class="debug-content">
            <div style="margin-bottom: 24px; display: grid; gap: 8px;">
                <button id="force-decay" class="primary-btn glass-btn">Simulate 7-day decay</button>
                <button id="debug-mock-ai" class="primary-btn glass-btn">Debug: Mock AI Advice</button>
                <button id="debug-mock-data" class="primary-btn"
                    style="background: rgba(59, 130, 246, 0.1); color: var(--accent); border: 1px solid var(--accent);">Mock
                    5 Struggling Words</button>
            </div>
            <table id="vocab-table">
                <thead>
                    <tr>
                        <th>Word</th>
                        <th>Level</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="vocab-body"></tbody>
            </table>
        </div>
    </div>

    <!-- practice panel: flashcards and quick quizzes for a word -->
    <div id="practice-panel" class="hidden">
        <div class="panel-header">
            <button id="close-practice" class="icon-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </button>
            <h2 id="practice-word-title">Examples</h2>
        </div>
        <div class="practice-content">
            <div id="practice-loading" class="hidden">
                <div class="spinner"></div>
                <p class="stat-label" style="text-align: center;">Preparing...</p>
            </div>
            <div id="practice-display">
                <h4 class="label-text" style="margin-bottom: 12px; font-size: 0.7rem;">USAGE EXAMPLES</h4>
                <ul id="practice-sentences" class="mini-list"></ul>

                <div id="quiz-section" style="margin-top: 24px;">
                    <h4 class="label-text" style="margin-bottom: 12px; font-size: 0.7rem;">QUICK CHECK</h4>
                    <div class="insight-text" id="quiz-question" style="margin-bottom: 12px;"></div>
                    <div id="quiz-options" style="display: grid; gap: 8px;"></div>
                </div>

                <div id="quiz-feedback" class="hidden"
                    style="margin-top: 16px; padding: 12px; border-radius: 8px; font-size: 0.85rem; text-align: center;">
                </div>
            </div>
        </div>
    </div>


    </div>
    <!-- the brains of the popup -->
    <script src="popup.js"></script>
</body>

</html>
